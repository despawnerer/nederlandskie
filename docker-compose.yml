services:
  db:
    image: mcr.microsoft.com/cbl-mariner/base/postgres:14
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=nederlandskie
    ports:
      - '5432:5432'
    networks:
      - backend
    volumes:
      - ./sql:/docker-entrypoint-initdb.d
      - db:/var/lib/postgresql/data

  feed-server:
    build:
      context: .
      target: dev
    command: cargo watch -x 'run --bin nederlandskie-feed-server'
    depends_on:
      - db
    ports:
      - 8000:8000
    networks:
      - backend
    volumes:
      - .:/app
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target:/app/target

  post-indexer:
    build:
      context: .
      target: dev
    command: cargo watch -x 'run --bin nederlandskie-post-indexer'
    depends_on:
      - db
    networks:
      - backend
    volumes:
      - .:/app
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target:/app/target

  profile-classifier:
    build:
      context: .
      target: dev
    command: cargo watch -x 'run --bin nederlandskie-profile-classifier'
    depends_on:
      - db
    networks:
      - backend
    volumes:
      - .:/app
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target:/app/target

  janitor:
    build:
      context: .
      target: dev
    command: cargo watch -x 'run --bin nederlandskie-janitor'
    depends_on:
      - db
    networks:
      - backend
    volumes:
      - .:/app
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target:/app/target

networks:
  backend:

volumes:
  db:
    driver: local
  cargo-registry:
  cargo-git:
  target:
